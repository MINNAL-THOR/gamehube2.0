<!DOCTYPE html>
<html>
<head>
  <title>Training Mode</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at center, #1e1e2f, #000);
      color: white;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    .ui {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 18px;
    }

    .shop {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
    }

    .shop button {
      padding: 8px 15px;
      margin: 5px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
    }

    .scratch {
      position: absolute;
      width: 4px;
      height: 20px;
      border-radius: 2px;
      animation: scratchAnim 0.4s linear forwards;
    }

    @keyframes scratchAnim {
      0% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: translateY(-20px) scale(1.5); }
    }
  </style>
</head>
<body>

<div class="ui">
  ❤️ HP: <span id="hp">100</span><br>
  💰 Coins: <span id="coins">0</span><br>
  🌊 Wave: <span id="wave">1</span>
</div>

<div class="shop">
  <button onclick="setBullet('default')">Default (Free)</button>
  <button onclick="buyBullet('rare')">Rare (1000)</button>
  <button onclick="buyBullet('epic')">Epic (2000)</button>
  <button onclick="buyBullet('legendary')">Legendary (3000)</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let coins = 0;
let wave = 1;
let playerHP = 100;

const heroImg = new Image();
heroImg.src = "../assets/hero.png";

const player = {
  x: canvas.width/2 - 40,
  y: canvas.height - 120,
  width: 80,
  height: 80
};

let bullets = [];
let enemies = [];

let ownedBullets = ["default"];
let currentBullet = "default";

const bulletStats = {
  default: { damage: 10, color: "white" },
  rare: { damage: 20, color: "cyan" },
  epic: { damage: 35, color: "violet" },
  legendary: { damage: 60, color: "gold" }
};

function setBullet(type){
  if(ownedBullets.includes(type)){
    currentBullet = type;
  }
}

function buyBullet(type){
  const prices = {
    rare: 1000,
    epic: 2000,
    legendary: 3000
  };

  if(ownedBullets.includes(type)){
    currentBullet = type;
    return;
  }

  if(coins >= prices[type]){
    coins -= prices[type];
    ownedBullets.push(type);
    currentBullet = type;
    updateUI();
  }
}

function updateUI(){
  document.getElementById("coins").textContent = coins;
  document.getElementById("wave").textContent = wave;
  document.getElementById("hp").textContent = playerHP;
}

function spawnEnemy(){
  enemies.push({
    x: Math.random() * (canvas.width - 50),
    y: -50,
    width: 50,
    height: 50,
    hp: 50 + wave * 10
  });
}

setInterval(spawnEnemy, 2000);

canvas.addEventListener("click", e => {
  bullets.push({
    x: player.x + player.width/2 - 5,
    y: player.y,
    width: 10,
    height: 20,
    damage: bulletStats[currentBullet].damage,
    color: bulletStats[currentBullet].color
  });
});

function createScratchEffect(x, y, color){
  for(let i=0;i<12;i++){
    const scratch = document.createElement("div");
    scratch.classList.add("scratch");
    scratch.style.left = x + "px";
    scratch.style.top = y + "px";
    scratch.style.background = color;
    scratch.style.transform = `rotate(${Math.random()*360}deg)`;
    document.body.appendChild(scratch);

    setTimeout(() => scratch.remove(), 400);
  }
}

function update(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.drawImage(heroImg, player.x, player.y, player.width, player.height);

  bullets.forEach((b, bi) => {
    b.y -= 7;
    ctx.fillStyle = b.color;
    ctx.fillRect(b.x, b.y, b.width, b.height);

    enemies.forEach((e, ei) => {
      if(b.x < e.x + e.width &&
         b.x + b.width > e.x &&
         b.y < e.y + e.height &&
         b.y + b.height > e.y){

        e.hp -= b.damage;
        createScratchEffect(e.x + e.width/2, e.y + e.height/2, b.color);
        bullets.splice(bi,1);

        if(e.hp <= 0){
          enemies.splice(ei,1);
          coins += 100;
          if(coins % 500 === 0) wave++;
          updateUI();
        }
      }
    });
  });

  enemies.forEach(e => {
    e.y += 2 + wave*0.3;
    ctx.fillStyle = "red";
    ctx.fillRect(e.x, e.y, e.width, e.height);

    if(e.y > canvas.height){
      playerHP -= 10;
      enemies.shift();
      updateUI();
    }
  });

  requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
