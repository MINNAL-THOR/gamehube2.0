<!DOCTYPE html>
<html>
<head>
<title>Training Ground</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
}

/* CANVAS */

canvas{
display:block;
}

/* JOYSTICKS */

.joystick{
position:fixed;
width:140px;
height:140px;
border-radius:50%;
background:rgba(255,255,255,0.08);
border:2px solid rgba(255,255,255,0.2);
z-index:10;
display:none;
}

.stick{
width:60px;
height:60px;
border-radius:50%;
background:rgba(255,255,255,0.4);
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
}

/* LEFT */

#leftJoystick{
bottom:40px;
left:40px;
}

/* RIGHT */

#rightJoystick{
bottom:40px;
right:40px;
}

/* SHOW ON MOBILE */

@media (hover:none){
.joystick{
display:block;
}
}

</style>
</head>

<body>

<canvas id="gameCanvas"></canvas>

<div id="leftJoystick" class="joystick">
<div class="stick"></div>
</div>

<div id="rightJoystick" class="joystick">
<div class="stick"></div>
</div>

<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let heroImg = new Image();
heroImg.src = "../assets/hero.png";

let mouse = { x: canvas.width/2, y: canvas.height/2 };

let player = {
x: canvas.width/2,
y: canvas.height/2,
size: 220,
speed: 4,
angle: 0
};

let bullets = [];
let keys = {};

/* AUTO FIRE */

let lastShot = 0;
let fireRate = 150;

/* JOYSTICKS */

const leftJoy = document.getElementById("leftJoystick");
const rightJoy = document.getElementById("rightJoystick");

const leftStick = leftJoy.querySelector(".stick");
const rightStick = rightJoy.querySelector(".stick");

let leftTouch = null;
let rightTouch = null;

let leftStart = {x:0,y:0};
let rightStart = {x:0,y:0};

/* DESKTOP INPUT */

document.addEventListener("mousemove",(e)=>{
const rect = canvas.getBoundingClientRect();
mouse.x = e.clientX - rect.left;
mouse.y = e.clientY - rect.top;
});

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()] = false);

document.addEventListener("click",shoot);

/* MOBILE TOUCH */

canvas.addEventListener("touchstart",(e)=>{

for(let t of e.changedTouches){

if(t.clientX < canvas.width/2 && leftTouch === null){
leftTouch = t.identifier;
leftStart.x = t.clientX;
leftStart.y = t.clientY;
}

else if(t.clientX >= canvas.width/2 && rightTouch === null){
rightTouch = t.identifier;
rightStart.x = t.clientX;
rightStart.y = t.clientY;
}

}

});

canvas.addEventListener("touchmove",(e)=>{

for(let t of e.changedTouches){

/* LEFT MOVE */

if(t.identifier === leftTouch){

let dx = t.clientX - leftStart.x;
let dy = t.clientY - leftStart.y;

player.x += dx * 0.05;
player.y += dy * 0.05;

leftStick.style.transform = `translate(${dx}px, ${dy}px)`;

}

/* RIGHT AIM */

if(t.identifier === rightTouch){

mouse.x = t.clientX;
mouse.y = t.clientY;

let dx = t.clientX - rightStart.x;
let dy = t.clientY - rightStart.y;

rightStick.style.transform = `translate(${dx}px, ${dy}px)`;

let now = Date.now();

if(now - lastShot > fireRate){
shoot();
lastShot = now;
}

}

}

});

canvas.addEventListener("touchend",(e)=>{

for(let t of e.changedTouches){

if(t.identifier === leftTouch){
leftTouch = null;
}

if(t.identifier === rightTouch){
rightTouch = null;
}

}

leftStick.style.transform = "translate(-50%,-50%)";
rightStick.style.transform = "translate(-50%,-50%)";

});

/* SHOOT */

function shoot(){

let aspect = heroImg.naturalWidth / heroImg.naturalHeight;
let width = player.size;
let height = width / aspect;

let forward = player.angle - Math.PI/2;

let noseX = player.x + Math.cos(forward)*(height/2);
let noseY = player.y + Math.sin(forward)*(height/2);

let speed = 10;

bullets.push({
x:noseX,
y:noseY,
dx:Math.cos(forward)*speed,
dy:Math.sin(forward)*speed,
size:8
});

}

/* UPDATE */

function update(){

if(keys["w"]) player.y -= player.speed;
if(keys["s"]) player.y += player.speed;
if(keys["a"]) player.x -= player.speed;
if(keys["d"]) player.x += player.speed;

player.angle = Math.atan2(mouse.y-player.y,mouse.x-player.x);

for(let i=bullets.length-1;i>=0;i--){

let b = bullets[i];

b.x += b.dx;
b.y += b.dy;

if(b.x<0 || b.x>canvas.width || b.y<0 || b.y>canvas.height){
bullets.splice(i,1);
}

}

}

/* DRAW */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.save();

ctx.translate(player.x,player.y);
ctx.rotate(player.angle + Math.PI/2);

let aspect = heroImg.naturalWidth / heroImg.naturalHeight;
let width = player.size;
let height = width / aspect;

ctx.drawImage(heroImg,-width/2,-height/2,width,height);

ctx.restore();

ctx.fillStyle="yellow";

bullets.forEach(b=>{
ctx.beginPath();
ctx.arc(b.x,b.y,b.size,0,Math.PI*2);
ctx.fill();
});

}

/* LOOP */

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
